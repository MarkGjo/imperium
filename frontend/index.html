<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1c1c1e;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
        }

        .status {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        .status.connected { color: #30d158; }
        .status.error { color: #ff453a; }

        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-wrapper.user-wrapper {
            align-items: flex-end;
        }

        .message-wrapper.response-wrapper {
            align-items: flex-start;
        }

        .message {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user {
            background: #1c1c1e;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.success {
            background: #0d3320;
            color: #30d158;
            border-bottom-left-radius: 4px;
        }

        .message.error {
            background: #3a1a1a;
            color: #ff453a;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap;
        }

        .message.processing {
            background: #1c1c1e;
            color: #ffd60a;
            border-bottom-left-radius: 4px;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message-wrapper:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: #1c1c1e;
            color: #fff;
        }

        .action-btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .input-area {
            padding: 12px 16px 24px;
            border-top: 1px solid #1c1c1e;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .text-input {
            flex: 1;
            background: #1c1c1e;
            border: none;
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 16px;
            color: #fff;
            outline: none;
        }

        .text-input::placeholder {
            color: #555;
        }

        .text-input:focus {
            box-shadow: 0 0 0 2px #0a84ff;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: #0a84ff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #0077ed;
        }

        .send-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            text-align: center;
            padding: 40px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state .hint {
            font-size: 14px;
            max-width: 280px;
        }

        .editing-hint {
            font-size: 11px;
            color: #ffd60a;
            margin-bottom: 4px;
            display: none;
        }

        .editing-hint.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Imperium</div>
        <div class="subtitle">Text-based AI Agent</div>
        <div class="status" id="status">Connecting...</div>
    </div>

    <div class="feed" id="feed">
        <div class="empty-state" id="emptyState">
            <div class="icon">💻</div>
            <div class="hint">Type a command to control your Mac. Try "open Safari" or "create a calculator app"</div>
        </div>
    </div>

    <div class="input-area">
        <div style="flex: 1; display: flex; flex-direction: column;">
            <div class="editing-hint" id="editingHint">Editing message — press Enter to send</div>
            <input 
                type="text" 
                class="text-input" 
                id="commandInput" 
                placeholder="Text your Mac..."
                autocomplete="off"
                autocapitalize="off"
            >
        </div>
        <button class="send-btn" id="sendBtn" disabled>
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

    <script>
        const SERVER_URL = window.location.origin;
        
        const feedEl = document.getElementById("feed");
        const emptyStateEl = document.getElementById("emptyState");
        const statusEl = document.getElementById("status");
        const inputEl = document.getElementById("commandInput");
        const sendBtn = document.getElementById("sendBtn");
        const editingHint = document.getElementById("editingHint");

        let isProcessing = false;
        let editingWrapper = null;

        function setStatus(msg, type = "") {
            statusEl.textContent = msg;
            statusEl.className = `status ${type}`;
        }

        async function checkConnection() {
            try {
                const res = await fetch(`${SERVER_URL}/`);
                await res.json();
                setStatus("Mac is connected ✓", "connected");
                inputEl.disabled = false;
                updateSendButton();
            } catch (err) {
                setStatus("Cannot reach Mac — same WiFi?", "error");
                inputEl.disabled = true;
                sendBtn.disabled = true;
                setTimeout(checkConnection, 3000);
            }
        }

        function createUserMessage(text) {
            if (emptyStateEl) {
                emptyStateEl.style.display = "none";
            }

            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper user-wrapper";
            wrapper.dataset.command = text;

            const msg = document.createElement("div");
            msg.className = "message user";
            msg.textContent = text;

            const actions = document.createElement("div");
            actions.className = "message-actions";

            const editBtn = document.createElement("button");
            editBtn.className = "action-btn";
            editBtn.innerHTML = `
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Edit
            `;
            editBtn.onclick = () => startEdit(wrapper);

            const retryBtn = document.createElement("button");
            retryBtn.className = "action-btn";
            retryBtn.innerHTML = `
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Retry
            `;
            retryBtn.onclick = () => retryCommand(wrapper);

            actions.appendChild(editBtn);
            actions.appendChild(retryBtn);

            wrapper.appendChild(msg);
            wrapper.appendChild(actions);
            feedEl.appendChild(wrapper);
            feedEl.scrollTop = feedEl.scrollHeight;

            return wrapper;
        }

        function addResponse(text, type, userWrapper) {
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper response-wrapper";
            if (userWrapper) {
                wrapper.dataset.userWrapper = "linked";
                userWrapper.linkedResponse = wrapper;
            }

            const msg = document.createElement("div");
            msg.className = `message ${type}`;
            msg.textContent = text;

            wrapper.appendChild(msg);
            feedEl.appendChild(wrapper);
            feedEl.scrollTop = feedEl.scrollHeight;

            return wrapper;
        }

        function startEdit(wrapper) {
            if (isProcessing) return;
            
            const command = wrapper.dataset.command;
            inputEl.value = command;
            editingWrapper = wrapper;
            editingHint.classList.add("show");
            inputEl.focus();
            inputEl.select();
            updateSendButton();
        }

        function retryCommand(wrapper) {
            if (isProcessing) return;
            
            const command = wrapper.dataset.command;
            
            // Remove the response if exists
            if (wrapper.linkedResponse) {
                wrapper.linkedResponse.remove();
            }
            // Remove the user message
            wrapper.remove();
            
            // Send the same command again
            inputEl.value = command;
            sendCommand();
        }

        function cancelEdit() {
            editingWrapper = null;
            editingHint.classList.remove("show");
        }

        function updateSendButton() {
            sendBtn.disabled = isProcessing || !inputEl.value.trim();
        }

        async function sendCommand() {
            const command = inputEl.value.trim();
            if (!command || isProcessing) return;

            // If editing, remove old message and its response
            if (editingWrapper) {
                if (editingWrapper.linkedResponse) {
                    editingWrapper.linkedResponse.remove();
                }
                editingWrapper.remove();
                cancelEdit();
            }

            isProcessing = true;
            updateSendButton();
            
            const userWrapper = createUserMessage(command);
            inputEl.value = "";
            
            const processingWrapper = addResponse("Processing...", "processing", null);

            try {
                const res = await fetch(`${SERVER_URL}/text-command`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ command })
                });

                const data = await res.json();
                
                processingWrapper.remove();

                if (data.error) {
                    addResponse(data.error, "error", userWrapper);
                } else if (data.osascript_ok === false) {
                    let errMsg = data.action || "Command failed";
                    if (data.osascript_error) {
                        errMsg += `\n${data.osascript_error}`;
                    }
                    addResponse(errMsg, "error", userWrapper);
                } else if (data.action) {
                    addResponse(`✓ ${data.action}`, "success", userWrapper);
                } else {
                    addResponse("✓ Command executed", "success", userWrapper);
                }

            } catch (err) {
                processingWrapper.remove();
                addResponse(`Error: ${err.message || "Request failed"}`, "error", userWrapper);
            }

            isProcessing = false;
            updateSendButton();
            inputEl.focus();
        }

        inputEl.addEventListener("input", () => {
            updateSendButton();
            // If user clears input while editing, cancel edit mode
            if (editingWrapper && !inputEl.value.trim()) {
                cancelEdit();
            }
        });
        
        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendCommand();
            }
            if (e.key === "Escape" && editingWrapper) {
                inputEl.value = "";
                cancelEdit();
                updateSendButton();
            }
        });

        sendBtn.addEventListener("click", sendCommand);

        checkConnection();
        inputEl.focus();
    </script>
</body>
</html>
