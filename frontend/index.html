<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1c1c1e;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
        }

        .status {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        .status.connected { color: #30d158; }
        .status.error { color: #ff453a; }

        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user {
            background: #1c1c1e;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.success {
            background: #0d3320;
            color: #30d158;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.error {
            background: #3a1a1a;
            color: #ff453a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap;
        }

        .message.processing {
            background: #1c1c1e;
            color: #ffd60a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 12px 16px 24px;
            border-top: 1px solid #1c1c1e;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .text-input {
            flex: 1;
            background: #1c1c1e;
            border: none;
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 16px;
            color: #fff;
            outline: none;
        }

        .text-input::placeholder {
            color: #555;
        }

        .text-input:focus {
            box-shadow: 0 0 0 2px #0a84ff;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: #0a84ff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #0077ed;
        }

        .send-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            text-align: center;
            padding: 40px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state .hint {
            font-size: 14px;
            max-width: 280px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Imperium</div>
        <div class="subtitle">Text-based AI Agent</div>
        <div class="status" id="status">Connecting...</div>
    </div>

    <div class="feed" id="feed">
        <div class="empty-state" id="emptyState">
            <div class="icon">💻</div>
            <div class="hint">Type a command to control your Mac. Try "open Safari" or "set volume to 50"</div>
        </div>
    </div>

    <div class="input-area">
        <input 
            type="text" 
            class="text-input" 
            id="commandInput" 
            placeholder="Text your Mac..."
            autocomplete="off"
            autocapitalize="off"
        >
        <button class="send-btn" id="sendBtn" disabled>
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

    <script>
        const SERVER_URL = window.location.origin;
        
        const feedEl = document.getElementById("feed");
        const emptyStateEl = document.getElementById("emptyState");
        const statusEl = document.getElementById("status");
        const inputEl = document.getElementById("commandInput");
        const sendBtn = document.getElementById("sendBtn");

        let isProcessing = false;

        function setStatus(msg, type = "") {
            statusEl.textContent = msg;
            statusEl.className = `status ${type}`;
        }

        async function checkConnection() {
            try {
                const res = await fetch(`${SERVER_URL}/`);
                await res.json();
                setStatus("Mac is connected ✓", "connected");
                inputEl.disabled = false;
                updateSendButton();
            } catch (err) {
                setStatus("Cannot reach Mac — same WiFi?", "error");
                inputEl.disabled = true;
                sendBtn.disabled = true;
                setTimeout(checkConnection, 3000);
            }
        }

        function addMessage(text, type) {
            if (emptyStateEl) {
                emptyStateEl.style.display = "none";
            }
            const msg = document.createElement("div");
            msg.className = `message ${type}`;
            msg.textContent = text;
            feedEl.appendChild(msg);
            feedEl.scrollTop = feedEl.scrollHeight;
            return msg;
        }

        function updateSendButton() {
            sendBtn.disabled = isProcessing || !inputEl.value.trim();
        }

        async function sendCommand() {
            const command = inputEl.value.trim();
            if (!command || isProcessing) return;

            isProcessing = true;
            updateSendButton();
            
            addMessage(command, "user");
            inputEl.value = "";
            
            const processingMsg = addMessage("Processing...", "processing");

            try {
                const res = await fetch(`${SERVER_URL}/text-command`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ command })
                });

                const data = await res.json();
                
                processingMsg.remove();

                if (data.error) {
                    addMessage(data.error, "error");
                } else if (data.osascript_ok === false) {
                    let errMsg = data.action || "Command failed";
                    if (data.osascript_error) {
                        errMsg += `\n${data.osascript_error}`;
                    }
                    addMessage(errMsg, "error");
                } else if (data.action) {
                    addMessage(`✓ ${data.action}`, "success");
                } else {
                    addMessage("✓ Command executed", "success");
                }

            } catch (err) {
                processingMsg.remove();
                addMessage(`Error: ${err.message || "Request failed"}`, "error");
            }

            isProcessing = false;
            updateSendButton();
            inputEl.focus();
        }

        inputEl.addEventListener("input", updateSendButton);
        
        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendCommand();
            }
        });

        sendBtn.addEventListener("click", sendCommand);

        checkConnection();
        inputEl.focus();
    </script>
</body>
</html>
